{% extends "base.html" %}

{% block content %}

<form method="POST">

    <h2>Login</h2>

    {{ form.hidden_tag() }}

    <p>{{ form.email.label }}</p>
    {{ form.email() }}

    <p>{{ form.password.label }}</p>
    {{ form.password() }}

    {{ form.submit() }}

    <p class="form-footer">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}">Create Account</a>
    </p>

</form>

{% endblock %}
